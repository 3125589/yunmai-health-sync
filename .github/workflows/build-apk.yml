name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
    
    - name: Accept Android SDK licenses
      run: yes | sdkmanager --licenses || true
    
    - name: Install Android SDK Platform 34
      run: sdkmanager "platforms;android-34" "build-tools;34.0.0" || true
    
    - name: Make gradlew executable
      run: chmod +x android-app/gradlew
    
    - name: Build APK with Gradle Wrapper
      run: |
        cd android-app
        ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tail -50
    
    - name: List APK files
      run: |
        echo "Finding APK files..."
        find android-app -name '*.apk' -type f
        ls -la android-app/app/build/outputs/apk/debug/ || true
    
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: yunmai-health-sync-apk
        path: android-app/app/build/outputs/apk/debug/*.apk
        if-no-files-found: error
    
    - name: Create Release with APK
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v${{ github.run_number }}
        name: Yunmai Health Sync v1.9.2 (Build ${{ github.run_number }})
        files: android-app/app/build/outputs/apk/debug/*.apk
        body: |
          云麦体重同步 Android App v1.9.2
          
          ## 功能
          - 新增「打开 Health Connect 设置」按钮
          - Health Connect SDK 1.0.0
          - 支持 Android 16 手动授权流程
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}