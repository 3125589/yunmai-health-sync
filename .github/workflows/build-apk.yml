name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        cmdline-tools-version: 11076708
        log-gradle-key: true
    
    - name: Make gradlew executable
      run: chmod +x android-app/gradlew
    
    - name: Build APK with Gradle Wrapper
      run: |
        cd android-app
        ./gradlew assembleDebug --no-daemon 2>&1 || true
        ./gradlew assembleDebug --stacktrace --no-daemon 2>&1 | tail -100
    
    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: yunmai-health-sync-apk
        path: android-app/app/build/outputs/apk/debug/*.apk
    
    - name: Create Release with APK
      if: success()
      uses: softprops/action-gh-release@v1
      with:
        tag_name: v1.2.0
        name: Yunmai Health Sync v1.2.0
        files: android-app/app/build/outputs/apk/debug/*.apk
        body: |
          云麦体重同步 Android App
          
          功能：
          - 自动从 API 获取云麦体重数据
          - 写入 Health Connect
          - 支持手动同步和定时同步
          
          重要：
          - 使用 Health Connect SDK 1.1.0-rc02
          - 正确请求 Health Connect 权限
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}